name: mello-local

socket:
  server_key: "mello_dev_key"
  port: 7350

console:
  port: 7351
  username: "admin"
  password: "adminadmin"

database:
  address:
    - "nakama:localdev@postgres:5432/nakama"

logger:
  level: "DEBUG"
  stdout: true

session:
  token_expiry_sec: 3600
  refresh_token_expiry_sec: 7776000

# Social auth — values come from env vars forwarded by docker-compose.
# Google auth doesn't need server config; Nakama validates id_tokens against
# Google's public keys. GOOGLE_CLIENT_ID is only used by the Go module via os.Getenv().
social:
  apple:
    bundle_id: "${APPLE_CLIENT_ID}"

steam:
  publisher_key: "${STEAM_PUBLISHER_KEY}"
  app_id: ${STEAM_APP_ID:-0}
  
runtime:
  path: "/nakama/data/modules"