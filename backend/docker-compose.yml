version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: mello-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localdev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nakama"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama-build:
    image: heroiclabs/nakama-pluginbuilder:3.21.0
    platform: linux/amd64
    container_name: mello-nakama-build
    volumes:
      - ./nakama/data/modules:/backend
    working_dir: /backend
    entrypoint:
      - /bin/sh
      - -c
      - |
        go mod tidy && go build -buildmode=plugin -trimpath -o ./backend.so .

  nakama:
    image: heroiclabs/nakama:3.21.0
    platform: linux/amd64
    container_name: mello-nakama
    depends_on:
      postgres:
        condition: service_healthy
      nakama-build:
        condition: service_completed_successfully
    environment:
      - STEAM_PUBLISHER_KEY=${STEAM_PUBLISHER_KEY:-}
      - STEAM_APP_ID=${STEAM_APP_ID:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-}
      - NAKAMA_HTTP_KEY=${NAKAMA_HTTP_KEY:-defaulthttpkey}
      - TURN_SECRET=${TURN_SECRET:-}
      - TURN_HOST=${TURN_HOST:-}
      - SFU_JWT_PRIVATE_KEY=${SFU_JWT_PRIVATE_KEY:-}
      - SFU_ENDPOINT_EU=${SFU_ENDPOINT_EU:-wss://sfu-eu.m3llo.app/ws}
    entrypoint:
      - /bin/sh
      - -c
      - |
        /nakama/nakama migrate up --database.address nakama:localdev@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/local.yml --runtime.http_key ${NAKAMA_HTTP_KEY:-defaulthttpkey}
    volumes:
      - ./nakama/data:/nakama/data
    ports:
      - "7350:7350" # gRPC API
      - "7351:7351" # HTTP API / Admin Console
      - "7352:7352" # gRPC API (alternate)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
