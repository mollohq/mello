services:
  - type: web
    name: mello-api
    runtime: docker
    repo: https://github.com/mollohq/mello
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: starter
    healthCheckPath: /healthcheck
    envVars:
      - key: NAKAMA_CONSOLE_USERNAME
        value: admin
      - key: NAKAMA_CONSOLE_PASSWORD
        generateValue: true
      - key: NAKAMA_SERVER_KEY
        generateValue: true
      - key: NAKAMA_HTTP_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mello-db
          property: connectionString
      - key: PORT
        value: "7350"
      - key: NAKAMA_CONSOLE_SIGNING_KEY
        generateValue: true
      - key: NAKAMA_SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: NAKAMA_SESSION_REFRESH_ENCRYPTION_KEY
        generateValue: true
      - key: STEAM_PUBLISHER_KEY
        sync: false
      - key: STEAM_APP_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: TWITCH_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        value: mello-clips
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_PUBLIC_URL
        sync: false

  - type: web
    name: mello-console
    runtime: docker
    repo: https://github.com/mollohq/mello
    branch: main
    rootDir: backend/console-proxy
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free

databases:
  - name: mello-db
    region: frankfurt
    plan: basic-256mb
    databaseName: nakama
    user: nakama
