
<div style="padding: 2rem 1rem; background: var(--color-background-secondary); border-radius: var(--border-radius-lg);">
    <p style="font-size: 12px; color: var(--color-text-tertiary); text-align: center; margin: 0 0 6px;">click the bar to advance through states</p>
  
    <div id="bar-wrap" style="max-width: 620px; margin: 0 auto; cursor: pointer; user-select: none;">
      <div id="bar" style="background: #1a1a1e; border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; min-height: 56px; transition: all 0.3s ease; position: relative; overflow: hidden;">
  
        <div id="avatar" style="width: 44px; height: 44px; border-radius: 10px; background: #2a2a30; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #888; flex-shrink: 0; letter-spacing: 0.5px;">ME</div>
  
        <div id="user-info" style="flex-shrink: 0; min-width: 80px;">
          <div style="font-size: 14px; font-weight: 500; color: #e8e8e8;">Navigator</div>
          <div style="font-size: 11px; color: #666;">#001</div>
        </div>
  
        <div id="center-content" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; transition: opacity 0.25s ease;">
          <div id="game-badge" style="width: 32px; height: 32px; border-radius: 8px; background: #8b5cf6; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; flex-shrink: 0;">CS</div>
          <div id="state-now-playing">
            <div style="font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px;">Now playing</div>
            <div style="font-size: 13px; color: #ccc; font-weight: 500;">Counter-Strike 2</div>
          </div>
          <div id="stream-btn" style="background: #e8364e; color: white; font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: 8px; letter-spacing: 0.5px;">STREAM</div>
        </div>
  
        <div id="state-postgame" style="display: none; flex: 1; align-items: center; justify-content: center; gap: 16px;">
          <div style="font-size: 13px; color: #888;">How'd it go?</div>
          <div style="display: flex; gap: 10px;">
            <div class="react-btn" data-type="win" style="width: 42px; height: 42px; border-radius: 10px; background: #1e2a1e; border: 1px solid #2d4a2d; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: transform 0.15s ease, background 0.15s ease;">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2"><path d="M6 9l2-4h8l2 4"/><path d="M4 9h16v2a8 8 0 01-16 0V9z"/><path d="M12 15v4m-3 0h6"/></svg>
            </div>
            <div class="react-btn" data-type="loss" style="width: 42px; height: 42px; border-radius: 10px; background: #2a1e1e; border: 1px solid #4a2d2d; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: transform 0.15s ease, background 0.15s ease;">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><path d="M12 2a10 10 0 100 20 10 10 0 000-20z"/><path d="M8 15s1.5-2 4-2 4 2 4 2"/><circle cx="9" cy="9" r="1" fill="#f87171"/><circle cx="15" cy="9" r="1" fill="#f87171"/></svg>
            </div>
            <div class="react-btn" data-type="moment" style="width: 42px; height: 42px; border-radius: 10px; background: #2a2418; border: 1px solid #4a3d1d; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: transform 0.15s ease, background 0.15s ease;">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M12 2l2.5 7H22l-6 4.5 2.5 7.5L12 17l-6.5 4 2.5-7.5L2 9h7.5z"/></svg>
            </div>
          </div>
        </div>
  
        <div id="state-moment-input" style="display: none; flex: 1; align-items: center; justify-content: center; gap: 10px;">
          <div id="moment-input-box" style="flex: 1; background: #222228; border: 1px solid #333; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #ccc; display: flex; align-items: center; gap: 8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M12 2l2.5 7H22l-6 4.5 2.5 7.5L12 17l-6.5 4 2.5-7.5L2 9h7.5z"/></svg>
            <span style="color: #888;">40-bomb on Dust2</span>
          </div>
          <div style="background: #e8364e; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M5 12h14m-7-7l7 7-7 7"/></svg>
          </div>
        </div>
  
        <div id="state-confirmed" style="display: none; flex: 1; align-items: center; justify-content: center; gap: 8px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
          <span style="font-size: 13px; color: #4ade80; font-weight: 500;">Moment shared with crew</span>
        </div>
  
        <div id="controls" style="display: flex; align-items: center; gap: 6px; flex-shrink: 0;">
          <div style="width: 36px; height: 36px; border-radius: 10px; background: #2a2a30; display: flex; align-items: center; justify-content: center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8364e" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          </div>
          <div style="width: 36px; height: 36px; border-radius: 10px; background: #fff; display: flex; align-items: center; justify-content: center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1e" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </div>
          <div style="width: 36px; height: 36px; border-radius: 10px; background: #2a2a30; display: flex; align-items: center; justify-content: center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zm-18 0a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/></svg>
          </div>
          <div style="width: 36px; height: 36px; border-radius: 10px; background: #2a2a30; display: flex; align-items: center; justify-content: center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </div>
        </div>
      </div>
    </div>
  
    <div style="display: flex; justify-content: center; gap: 6px; margin-top: 16px;">
      <div class="dot" id="dot-0" style="width: 8px; height: 8px; border-radius: 50%; background: #e8364e; transition: background 0.2s;"></div>
      <div class="dot" id="dot-1" style="width: 8px; height: 8px; border-radius: 50%; background: #333; transition: background 0.2s;"></div>
      <div class="dot" id="dot-2" style="width: 8px; height: 8px; border-radius: 50%; background: #333; transition: background 0.2s;"></div>
      <div class="dot" id="dot-3" style="width: 8px; height: 8px; border-radius: 50%; background: #333; transition: background 0.2s;"></div>
    </div>
    <div id="state-label" style="text-align: center; margin-top: 8px; font-size: 12px; color: var(--color-text-secondary);">State 1: Now playing (game is running)</div>
  </div>
  
  <script>
  let state = 0;
  const states = [
    { label: "State 1: Now playing (game is running)", show: "state-now-playing", hideAll: true },
    { label: "State 2: Game ended, post-game prompt", show: "state-postgame" },
    { label: "State 3: User tapped highlight, moment input", show: "state-moment-input" },
    { label: "State 4: Confirmed, fades out", show: "state-confirmed" }
  ];
  
  const bar = document.getElementById("bar-wrap");
  const label = document.getElementById("state-label");
  
  function showState(idx) {
    const np = document.getElementById("state-now-playing");
    const sb = document.getElementById("stream-btn");
    const pg = document.getElementById("state-postgame");
    const mi = document.getElementById("state-moment-input");
    const cf = document.getElementById("state-confirmed");
    const gb = document.getElementById("game-badge");
  
    np.style.display = "none";
    sb.style.display = "none";
    pg.style.display = "none";
    mi.style.display = "none";
    cf.style.display = "none";
  
    if (idx === 0) {
      np.style.display = "block";
      sb.style.display = "block";
      gb.style.display = "flex";
    } else if (idx === 1) {
      gb.style.display = "flex";
      pg.style.display = "flex";
    } else if (idx === 2) {
      gb.style.display = "none";
      mi.style.display = "flex";
    } else if (idx === 3) {
      gb.style.display = "none";
      cf.style.display = "flex";
    }
  
    for (let i = 0; i < 4; i++) {
      document.getElementById("dot-" + i).style.background = i === idx ? "#e8364e" : "#333";
    }
    label.textContent = states[idx].label;
  }
  
  bar.addEventListener("click", function() {
    state = (state + 1) % 4;
    showState(state);
  });
  
  showState(0);
  </script>
