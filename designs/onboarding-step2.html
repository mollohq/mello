<head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Crew Companion - Onboarding Step 2</title>
    <style vid="5">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --c-bg-app: #0D0D0F;
            --c-surface: #1A1A1F;
            --c-surface-elevated: #24242B;
            --c-text-primary: #F5F5F5;
            --c-text-secondary: #707075;
            --c-text-tertiary: #45454A;
            --c-accent: #FF1E56;
            --c-graphic-light: #2A2A30;
            --c-graphic-med: #404045;

            --f-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --f-mono: 'JetBrains Mono', monospace;

            --r-outer: 8px;
            --r-inner: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: var(--c-text-primary);
            font-family: var(--f-sans);
            height: 900px;
            width: 1440px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .os-chrome {
            width: 1440px;
            height: 900px;
            display: flex;
            flex-direction: column;
            border-radius: var(--r-outer);
            overflow: hidden;
            background: var(--c-bg-app);
            position: relative;
        }

        .titlebar {
            height: 32px;
            background: #121214;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            flex-shrink: 0;
            border-bottom: 1px solid #1F1F23;
        }

        .titlebar-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .onboarding-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 80px 140px;
            width: 100%;
        }

        .header-meta {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
        }

        .step-indicator {
            font-family: var(--f-mono);
            font-size: 13px;
            color: var(--c-accent);
            letter-spacing: 0.15em;
            font-weight: 500;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .progress-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 32px;
            height: 2px;
            border-radius: 0;
            background: var(--c-graphic-light);
        }

        .dot.active {
            background: var(--c-accent);
        }

        .onboarding-title {
            font-size: 36px;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: var(--c-text-primary);
            margin-bottom: 64px;
        }

        .setup-layout {
            display: grid;
            grid-template-columns: 440px 1fr;
            gap: 120px;
            flex: 1;
        }

        .label-kicker {
            font-family: var(--f-mono);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--c-text-secondary);
            margin-bottom: 20px;
            display: block;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 48px;
        }

        .avatar-option {
            aspect-ratio: 1;
            background: var(--c-surface);
            border-radius: var(--r-inner);
            border: 1px solid var(--c-graphic-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .avatar-option.selected {
            border-color: var(--c-accent);
            background: rgba(255, 30, 86, 0.08);
            box-shadow: 0 0 0 1px var(--c-accent);
        }

        .pixel-glyph {
            width: 32px;
            height: 32px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
        }

        .pixel-glyph div {
            background: var(--c-text-tertiary);
        }

        .selected .pixel-glyph div {
            background: var(--c-accent);
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .text-input {
            background: var(--c-surface);
            border: 1px solid var(--c-graphic-light);
            border-radius: var(--r-inner);
            padding: 18px;
            font-family: var(--f-mono);
            font-size: 15px;
            color: var(--c-text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .text-input:focus {
            border-color: var(--c-graphic-med);
        }

        .device-stack {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 480px;
        }

        .device-card {
            background: var(--c-surface);
            border: 1px solid var(--c-graphic-light);
            border-radius: var(--r-inner);
            padding: 24px;
        }

        .selector-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .device-label {
            font-family: var(--f-mono);
            font-size: 14px;
            color: var(--c-text-primary);
        }

        .meter-container {
            display: flex;
            gap: 3px;
            height: 6px;
            width: 100%;
        }

        .meter-bar {
            flex: 1;
            background: var(--c-bg-app);
            border-radius: 1px;
        }

        .meter-bar.fill {
            background: var(--c-accent);
        }

        .meter-bar.dim {
            background: #2D141B;
        }

        .footer-action {
            position: absolute;
            bottom: 80px;
            right: 140px;
        }

        .btn-continue {
            background: var(--c-accent);
            color: #FFF;
            padding: 18px 40px;
            border-radius: var(--r-inner);
            font-family: var(--f-mono);
            font-size: 15px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.1s;
        }

        .btn-continue:active {
            transform: scale(0.98);
        }

        svg.icon-down {
            stroke: var(--c-text-secondary);
        }
    </style>
</head>
