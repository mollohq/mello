            justify-content: center;
            height: 100vh;
            width: 100vw;

        }

        
        .scroll-area::-webkit-scrollbar {
            width: 4px;
        }
        .scroll-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: var(--c-border);
            border-radius: 4px;
        }

        
        @keyframes eq-bounce {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
        
        @keyframes eq-bounce-alt {
            0%, 100% { height: 6px; }
            50% { height: 12px; }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 1px rgba(255, 30, 86, 0.4), 0 0 12px rgba(255, 30, 86, 0.2); }
            50% { box-shadow: 0 0 0 2px rgba(255, 30, 86, 0.6), 0 0 20px rgba(255, 30, 86, 0.4); }
        }

        .speaking-bar-1 { animation: eq-bounce 0.7s ease-in-out infinite; }
        .speaking-bar-2 { animation: eq-bounce-alt 0.5s ease-in-out infinite 0.1s; }
        .speaking-bar-3 { animation: eq-bounce 0.6s ease-in-out infinite 0.2s; }

        .avatar-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        
        .widget-container {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            box-shadow: 0 24px 64px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
        }

        .user-card {
            transition: background-color 0.15s ease;
        }
        
        .user-card:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }
    </style>
