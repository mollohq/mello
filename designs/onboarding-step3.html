    <title vid="4">Crew Companion - Save Account</title>
    <style vid="5">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --c-bg-app: #111111;
            --c-surface: #181818;
            --c-surface-elevated: #202020;
            --c-text-primary: #F5F5F5;
            --c-text-secondary: #606060;
            --c-text-tertiary: #404040;
            --c-accent: #FF1E56;
            --c-graphic-light: #2E2E2E;
            --c-graphic-med: #404040;
            --c-graphic-dark: #F5F5F5;

            --f-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --f-mono: 'JetBrains Mono', monospace;

            --r-outer: 10px;
            --r-inner: 6px;
            --r-pill: 999px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: var(--c-text-primary);
            font-family: var(--f-sans);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .os-chrome {
            width: 1440px;
            height: 900px;
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            background: var(--c-bg-app);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .titlebar {
            height: 32px;
            background: #161616;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            flex-shrink: 0;
            position: relative;
            border-bottom: 1px solid #2A2A2A;
        }

        .titlebar-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .titlebar-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.2);
            font-family: var(--f-mono);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .onboarding-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 80px 120px;
            width: 100%;
            align-items: flex-start;
            text-align: left;
        }

        .onboarding-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .onboarding-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .onboarding-header {
            margin-bottom: 48px;
            width: 100%;
            text-align: left;
        }

        .step-indicator {
            font-family: var(--f-mono);
            font-size: 13px;
            color: var(--c-accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 16px;
        }

        .step-dots {
            display: flex;
            gap: 6px;
        }

        .step-dot {
            width: 32px;
            height: 2px;
            background: var(--c-graphic-light);
        }

        .step-dot.active {
            background: var(--c-accent);
        }

        .onboarding-title {
            font-size: 48px;
            font-weight: 500;
            letter-spacing: -0.03em;
            color: var(--c-text-primary);
            margin-bottom: 8px;
        }

        .onboarding-subline {
            font-size: 14px;
            color: var(--c-text-secondary);
            font-family: var(--f-mono);
        }

        .summary-card {
            background: var(--c-surface);
            border: 1px solid var(--c-graphic-light);
            border-radius: var(--r-inner);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 64px;
            width: fit-content;
        }

        .summary-avatar {
            width: 48px;
            height: 48px;
            background: rgba(255, 30, 86, 0.1);
            border: 1px solid var(--c-accent);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--f-mono);
            color: var(--c-text-primary);
            font-size: 18px;
        }

        .summary-details {
            text-align: left;
        }

        .summary-nickname {
            font-family: var(--f-mono);
            font-size: 16px;
            font-weight: 500;
            color: var(--c-text-primary);
            margin-bottom: 4px;
        }

        .summary-crew {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--c-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #28C840;
            box-shadow: 0 0 8px #28C840;
        }

        .auth-grid {
            display: grid;
            grid-template-columns: repeat(2, 280px);
            gap: 16px;
            margin-bottom: 48px;
        }

        .auth-button {
            background: transparent;
            border: 1px solid var(--c-graphic-light);
            border-radius: var(--r-inner);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--c-text-primary);
            font-family: var(--f-mono);
            font-size: 13px;
            text-align: left;
        }

        .auth-button:hover {
            border-color: var(--c-graphic-med);
            background: rgba(255, 255, 255, 0.02);
        }

        .auth-icon {
            width: 20px;
            height: 20px;
            opacity: 0.8;
        }

        .btn-email {
            grid-column: span 2;
            justify-content: center;
            opacity: 0.6;
            border-style: dashed;
        }

        .btn-email:hover {
            opacity: 1;
        }

        .skip-link {
            font-family: var(--f-mono);
            font-size: 11px;
            color: var(--c-text-tertiary);
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .skip-link:hover {
            color: var(--c-text-secondary);
        }
    </style>
</head>
