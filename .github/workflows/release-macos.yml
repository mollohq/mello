name: macOS Release

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering a manual build?"
        required: true
        default: "I need a binary package for testing!"
      version:
        description: "Override version number (optional, e.g., 2025.11.2)"
        required: false
        default: ""

permissions:
  contents: write

env:
  RELEASE_CHANNEL: "osx-arm64-stable"
  CODE_SIGNING_KEYCHAIN: "mello_code_signing"
  NOTARY_PROFILE_NAME: "mello-signing-notary-profile"

jobs:
  build-macos:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Set version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" == "release" ]; then
            version="${{ github.event.release.tag_name }}"
          else
            version="0.0.${{ github.run_number }}"
          fi
          version="${version#v}"
          echo "RELEASE_VERSION=$version" >> $GITHUB_ENV

      - name: Stamp version in Cargo.toml
        run: sed -i'' -e "s/^version = \"[^\"]*\"/version = \"$RELEASE_VERSION\"/" Cargo.toml

      - name: Import build certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          keychain: ${{ env.CODE_SIGNING_KEYCHAIN }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Import installer certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          keychain: ${{ env.CODE_SIGNING_KEYCHAIN }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          create-keychain: false
          p12-file-base64: ${{ secrets.INSTALLER_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Store notarytool credentials
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/${{ env.CODE_SIGNING_KEYCHAIN }}.keychain-db"
          xcrun notarytool store-credentials \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --keychain "$KEYCHAIN_PATH" \
            "${{ env.NOTARY_PROFILE_NAME }}"

      - name: Build client
        run: cargo build --release --features production
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Assemble dist
        run: |
          mkdir -p dist
          cp target/release/mello dist/
          cp libmello/third_party/onnxruntime/onnxruntime-osx-arm64-*/lib/libonnxruntime*.dylib dist/
          cp $(find target/release/build -name silero_vad.onnx | head -1) dist/

      - name: Codesign external libraries
        run: |
          echo "Signing ONNX Runtime libraries..."
          for dylib in dist/libonnxruntime*.dylib; do
            codesign --force --verbose --options runtime --timestamp \
              --sign "Developer ID Application: ${{ secrets.APPLE_TEAM_NAME }}" \
              "$dylib"
          done

      - name: Velopack Package
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/${{ env.CODE_SIGNING_KEYCHAIN }}.keychain-db"
          mkdir -p vpk-out
          vpk download github --repoUrl https://github.com/mollohq/mello --outputDir vpk-out --channel $RELEASE_CHANNEL --token ${{ secrets.GH_PAT }}
          vpk pack \
            --packId app.m3llo.macos \
            --packVersion $RELEASE_VERSION \
            --packDir dist \
            --mainExe mello \
            --packTitle Mello \
            --channel $RELEASE_CHANNEL \
            --outputDir vpk-out \
            --icon client/assets/icons/mello.icns \
            --signAppIdentity "Developer ID Application: ${{ secrets.APPLE_TEAM_NAME }}" \
            --signInstallIdentity "Developer ID Installer: ${{ secrets.APPLE_TEAM_NAME }}" \
            --notaryProfile "${{ env.NOTARY_PROFILE_NAME }}" \
            --keychain "$KEYCHAIN_PATH" \
            --signEntitlements client/macos/release.entitlements

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        run: |
          for f in vpk-out/*; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mello-macos-arm64
          path: vpk-out/*

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain ${{ env.CODE_SIGNING_KEYCHAIN }}.keychain-db || true
