name: Release

on:
  push:
    tags: ['v*']

  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering a manual build?"
        required: true
        default: "I need a binary package for testing!"
      version:
        description: "Override version number (optional, e.g., 2025.11.2)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: [self-hosted, Windows]
    env:
      RELEASE_CHANNEL: "win-x64-stable"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Set version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $version = "${{ inputs.version }}" -replace '^v',''
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v',''
          } else {
            $version = "0.0.${{ github.run_number }}"
          }
          echo "RELEASE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Stamp version in Cargo.toml
        shell: pwsh
        run: |
          $content = Get-Content Cargo.toml -Raw
          $content = $content -replace '(?m)^(version\s*=\s*")[^"]+"', "`${1}$env:RELEASE_VERSION`""
          Set-Content Cargo.toml -Value $content -NoNewline

      - name: Refresh lockfile for stamped workspace version
        shell: pwsh
        run: cargo update --workspace --offline

      - name: Build client
        run: cargo build --release --locked --workspace --features mello-client/production
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          NAKAMA_SERVER_KEY: ${{ secrets.NAKAMA_SERVER_KEY }}
          NAKAMA_HTTP_KEY: ${{ secrets.NAKAMA_HTTP_KEY }}

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Assemble dist
        shell: pwsh
        run: |
          mkdir dist
          cp target/release/mello.exe dist/
          cp target/release/m3llo-hud.exe dist/
          cp libmello/third_party/onnxruntime/onnxruntime-win-x64-*/lib/onnxruntime.dll dist/
          cp libmello/third_party/onnxruntime/onnxruntime-win-x64-*/lib/onnxruntime_providers_shared.dll dist/
          cp (Get-ChildItem target/release/build -Recurse -Filter silero_vad.onnx | Select -First 1).FullName dist/
          del dist/*.lib -ErrorAction SilentlyContinue

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure Login
        run: az account show --output table

      - name: Velopack Package
        shell: cmd
        run: |
          mkdir vpk-out
          vpk download github --repoUrl https://github.com/mollohq/mello --outputDir vpk-out --channel %RELEASE_CHANNEL% --token ${{ secrets.GH_PAT }}
          vpk pack ^
            --packId m3llo ^
            --packVersion %RELEASE_VERSION% ^
            --packDir dist ^
            --mainExe mello.exe ^
            --packTitle Mello ^
            --channel %RELEASE_CHANNEL% ^
            --outputDir vpk-out ^
            --icon client/assets/icons/mello.ico ^
            --azureTrustedSignFile client/windows/signing-metadata.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mello-windows-x64
          path: vpk-out/*

      - name: Cleanup build artifacts
        if: always()
        run: cargo clean

  build-macos:
    runs-on: [self-hosted, macOS]
    env:
      RELEASE_CHANNEL: "osx-arm64-stable"
      CODE_SIGNING_KEYCHAIN: "mello_code_signing"
      NOTARY_PROFILE_NAME: "mello-signing-notary-profile"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Set version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            version="${{ github.ref_name }}"
          else
            version="0.0.${{ github.run_number }}"
          fi
          version="${version#v}"
          echo "RELEASE_VERSION=$version" >> $GITHUB_ENV

      - name: Stamp version in Cargo.toml
        run: sed -i'' -e "s/^version = \"[^\"]*\"/version = \"$RELEASE_VERSION\"/" Cargo.toml

      - name: Refresh lockfile for stamped workspace version
        run: cargo update --workspace --offline

      - name: Stamp version in Info.plist
        run: |
          PLIST=client/macos/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $RELEASE_VERSION" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $RELEASE_VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $RELEASE_VERSION" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $RELEASE_VERSION" "$PLIST"

      - name: Import build certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          keychain: ${{ env.CODE_SIGNING_KEYCHAIN }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Import installer certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          keychain: ${{ env.CODE_SIGNING_KEYCHAIN }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          create-keychain: false
          p12-file-base64: ${{ secrets.INSTALLER_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Store notarytool credentials
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/${{ env.CODE_SIGNING_KEYCHAIN }}.keychain-db"
          xcrun notarytool store-credentials \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --keychain "$KEYCHAIN_PATH" \
            "${{ env.NOTARY_PROFILE_NAME }}"

      - name: Build client
        run: cargo build --release --locked --workspace --features mello-client/production
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          NAKAMA_SERVER_KEY: ${{ secrets.NAKAMA_SERVER_KEY }}
          NAKAMA_HTTP_KEY: ${{ secrets.NAKAMA_HTTP_KEY }}

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Assemble dist
        run: |
          mkdir -p dist
          cp target/release/mello dist/
          # Preserve ORT symlink structure so the unversioned dylib stays a symlink.
          cp -P libmello/third_party/onnxruntime/onnxruntime-osx-arm64-*/lib/libonnxruntime*.dylib dist/
          cp $(find target/release/build -name silero_vad.onnx | head -1) dist/

      - name: Codesign external libraries
        run: |
          echo "Signing ONNX Runtime libraries..."
          for dylib in dist/libonnxruntime*.dylib; do
            if [ -L "$dylib" ]; then
              continue
            fi
            codesign --force --verbose --options runtime --timestamp \
              --sign "Developer ID Application: ${{ secrets.APPLE_TEAM_NAME }}" \
              "$dylib"
          done

      - name: Velopack Package
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/${{ env.CODE_SIGNING_KEYCHAIN }}.keychain-db"
          mkdir -p vpk-out
          vpk download github --repoUrl https://github.com/mollohq/mello --outputDir vpk-out --channel $RELEASE_CHANNEL --token ${{ secrets.GH_PAT }}
          vpk pack \
            --packId m3llo \
            --packVersion $RELEASE_VERSION \
            --packDir dist \
            --mainExe mello \
            --packTitle Mello \
            --channel $RELEASE_CHANNEL \
            --outputDir vpk-out \
            --icon client/assets/icons/mello.icns \
            --signAppIdentity "Developer ID Application: ${{ secrets.APPLE_TEAM_NAME }}" \
            --signInstallIdentity "Developer ID Installer: ${{ secrets.APPLE_TEAM_NAME }}" \
            --notaryProfile "${{ env.NOTARY_PROFILE_NAME }}" \
            --keychain "$KEYCHAIN_PATH" \
            --signEntitlements client/macos/release.entitlements \
            --plist client/macos/Info.plist

      - name: Fetch notarization log on failure
        if: failure()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/${{ env.CODE_SIGNING_KEYCHAIN }}.keychain-db"
          xcrun notarytool history \
            --keychain-profile "${{ env.NOTARY_PROFILE_NAME }}" \
            --keychain "$KEYCHAIN_PATH" 2>&1 | head -20
          SUBMISSION_ID=$(xcrun notarytool history \
            --keychain-profile "${{ env.NOTARY_PROFILE_NAME }}" \
            --keychain "$KEYCHAIN_PATH" 2>/dev/null | grep -m1 'id:' | awk '{print $2}')
          if [ -n "$SUBMISSION_ID" ]; then
            echo "Fetching log for submission $SUBMISSION_ID..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --keychain-profile "${{ env.NOTARY_PROFILE_NAME }}" \
              --keychain "$KEYCHAIN_PATH" 2>&1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mello-macos-arm64
          path: vpk-out/*

      - name: Cleanup keychain and build artifacts
        if: always()
        run: |
          security delete-keychain ${{ env.CODE_SIGNING_KEYCHAIN }}.keychain-db || true
          cargo clean

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: mello-windows-x64
          path: assets/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mello-macos-arm64
          path: assets/

      - name: Create release and upload assets
        run: |
          gh release create "$GITHUB_REF_NAME" assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "${GITHUB_REF_NAME#v}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
