name: Windows Release

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering a manual build?"
        required: true
        default: "I need a binary package for testing!"
      version:
        description: "Override version number (optional, e.g., 2025.11.2)"
        required: false
        default: ""

permissions:
  contents: write

env:
  RELEASE_CHANNEL: "win-x64-stable"

jobs:
  build-windows:
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Set version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $version = "${{ inputs.version }}" -replace '^v',''
          } elseif ("${{ github.event_name }}" -eq "release") {
            $version = "${{ github.event.release.tag_name }}" -replace '^v',''
          } else {
            $version = "0.0.${{ github.run_number }}"
          }
          echo "RELEASE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Stamp version in Cargo.toml
        shell: pwsh
        run: |
          $content = Get-Content Cargo.toml -Raw
          $content = $content -replace '(?m)^(version\s*=\s*")[^"]+"', "`${1}$env:RELEASE_VERSION`""
          Set-Content Cargo.toml -Value $content -NoNewline

      - name: Build client
        run: cargo build --release --features production
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          NAKAMA_SERVER_KEY: ${{ secrets.NAKAMA_SERVER_KEY }}
          NAKAMA_HTTP_KEY: ${{ secrets.NAKAMA_HTTP_KEY }}

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Assemble dist
        shell: pwsh
        run: |
          mkdir dist
          cp target/release/mello.exe dist/
          cp libmello/third_party/onnxruntime/onnxruntime-win-x64-*/lib/onnxruntime.dll dist/
          cp libmello/third_party/onnxruntime/onnxruntime-win-x64-*/lib/onnxruntime_providers_shared.dll dist/
          cp (Get-ChildItem target/release/build -Recurse -Filter silero_vad.onnx | Select -First 1).FullName dist/
          del dist/*.lib -ErrorAction SilentlyContinue

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Login
        run: az account show --output table

      - name: Velopack Package
        shell: cmd
        run: |
          mkdir vpk-out
          vpk download github --repoUrl https://github.com/mollohq/mello --outputDir vpk-out --channel %RELEASE_CHANNEL% --token ${{ secrets.GH_PAT }}
          vpk pack ^
            --packId m3llo ^
            --packVersion %RELEASE_VERSION% ^
            --packDir dist ^
            --mainExe mello.exe ^
            --packTitle Mello ^
            --channel %RELEASE_CHANNEL% ^
            --outputDir vpk-out ^
            --icon client/assets/icons/mello.ico ^
            --azureTrustedSignFile client/windows/signing-metadata.json

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          $files = Get-ChildItem vpk-out -File
          foreach ($f in $files) {
            gh release upload "${{ github.event.release.tag_name }}" $f.FullName --clobber
          }
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mello-windows-x64
          path: vpk-out/*
